[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ecotrace"
version = "0.3.0"
description = " A lightweight Python library to measure the carbon footprint of your code"
readme = "README.md"
requires-python = ">=3.7"
# İsim ve e-posta kısmını buraya böyle ekleyebilirsin:
authors = [
  { name="Emre Ozkal", email="emreozkal03@gmail.com" }
]
dependencies = [
    "psutil",
    "py-cpuinfo",
    "fpdf",
    "matplotlib",
    "nvidia-ml-py",
    "wmi; sys_platform == 'win32'"
]
[project.urls]
Homepage = "https://github.com/Zwony/ecotrace"
Repository = "https://github.com/Zwony/ecotrace"

[tool.setuptools]
packages = ["ecotrace"]

[tool.setuptools.package-data]
ecotrace = ["*.json"]