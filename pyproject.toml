[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ecotrace"
version = "0.3.3"
description = "EcoTrace: A powerful Python library to measure CPU/GPU energy consumption and estimate carbon emissions with detailed PDF reporting and continuous sampling."
keywords = ["carbon-footprint", "energy-efficiency", "green-computing", "sustainability", "metrics", "cpu-monitoring", "gpu-monitoring"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3.7",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering :: Information Analysis",
]
readme = "README.md"
requires-python = ">=3.7"
# İsim ve e-posta kısmını buraya böyle ekleyebilirsin:
authors = [
  { name="Emre Ozkal", email="emreozkal03@gmail.com" }
]
dependencies = [
    "psutil",
    "py-cpuinfo",
    "fpdf",
    "matplotlib",
    "nvidia-ml-py",
    "wmi; sys_platform == 'win32'"
]
[project.urls]
Homepage = "https://github.com/Zwony/ecotrace"
Repository = "https://github.com/Zwony/ecotrace"

[tool.setuptools]
packages = ["ecotrace"]

[tool.setuptools.package-data]
ecotrace = ["*.json"]