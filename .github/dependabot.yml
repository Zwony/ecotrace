# 🌿 EcoTrace: Dependabot Configuration
# Keeps our Sustainability OS dependencies secure and up-to-date.

version: 2
updates:
  # 1. Python Core (PIP)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    reviewers:
      - "Zwony"
    labels:
      - "security"
      - "dependencies"

  # 2. VS Code Extension (NPM)
  - package-ecosystem: "npm"
    directory: "/ecotrace-vscode"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "vscode-ext"
      - "dependencies"

  # 3. GitHub Actions Workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
